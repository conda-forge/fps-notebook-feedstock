schema_version: 1

context:
  version: "0.10.2"

package:
  name: fps-notebook
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-notebook/fps_notebook-${{ version }}.tar.gz
    sha256: 6113516aacb64b16596ef362e1553cda048544e1da69f2fd807b7559d88aa02b

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0
    - notebook-frontend >=7.4.2,<8.0.0

tests:
  - python:
      imports: fps_notebook
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/notebook
  summary: An FPS plugin for the Notebook API

extra:
  recipe-maintainers:
    - davidbrochart
